# Tune combos for ARDUX
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=24
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=8
CONFIG_ZMK_COMBO_MAX_PRESSED_COMBOS=8

# Bluetooth
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# OLED display — shows current layer name
CONFIG_ZMK_DISPLAY=y

# Mouse support (new ZMK uses CONFIG_ZMK_POINTING)
CONFIG_ZMK_POINTING=y

# Deep sleep — keep off for now to avoid connection issues while learning
CONFIG_ZMK_SLEEP=n
